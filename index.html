<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Plane Tracker</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:           #0b0e14;
      --panel-bg:     #0f1319;
      --panel-border: #1e2530;
      --accent:       #00d4ff;
      --accent2:      #ff6b35;
      --text:         #c8d8e8;
      --text-dim:     #5a7080;
      --good:         #39ff8a;
      --sidebar-w:    260px;
    }

    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Rajdhani', sans-serif; font-size: 15px; overflow: hidden; }

    /* ── Header ───────────────────────────────────────────── */
    #header {
      position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
      height: 48px; background: rgba(11,14,20,0.95);
      border-bottom: 1px solid var(--panel-border);
      display: flex; align-items: center; gap: 14px;
      padding: 0 20px; backdrop-filter: blur(8px);
    }
    #header h1 { font-size: 20px; font-weight: 700; letter-spacing: 3px; color: var(--accent); text-transform: uppercase; flex-shrink: 0; }
    #header h1 span { color: var(--text-dim); font-weight: 400; }

    #source-badge {
      font-size: 10px; font-family: 'Share Tech Mono', monospace;
      padding: 3px 8px; border-radius: 3px; letter-spacing: 1px;
      background: rgba(57,255,138,0.1); color: var(--good);
      border: 1px solid var(--good); flex-shrink: 0;
    }

    /* Poller status */
    #poller-status { font-family: 'Share Tech Mono', monospace; font-size: 11px; color: var(--text-dim); display: flex; align-items: center; gap: 8px; }
    #poller-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--text-dim); flex-shrink: 0; transition: background .3s; }
    #poller-dot.polling { background: var(--accent); box-shadow: 0 0 6px var(--accent); animation: pulse .8s infinite; }
    #poller-dot.waiting { background: var(--text-dim); }
    @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.3; } }
    #poller-label { letter-spacing: 1px; }

    #next-cycle-wrap { font-family: 'Share Tech Mono', monospace; font-size: 11px; color: var(--text-dim); }
    #next-cycle-wrap span { color: var(--text); }

    #plane-count { margin-left: auto; font-family: 'Share Tech Mono', monospace; font-size: 12px; color: var(--text-dim); flex-shrink: 0; }
    #plane-count b { color: var(--accent); font-size: 16px; }

    #last-updated { font-family: 'Share Tech Mono', monospace; font-size: 10px; color: var(--text-dim); flex-shrink: 0; }

    /* ── Shell ─────────────────────────────────────────────── */
    #shell { position: fixed; top: 48px; bottom: 0; left: 0; right: 0; display: flex; }

    /* ── Sidebar ───────────────────────────────────────────── */
    #sidebar {
      width: var(--sidebar-w); flex-shrink: 0;
      background: var(--panel-bg); border-right: 1px solid var(--panel-border);
      display: flex; flex-direction: column; overflow: hidden;
    }
    .sb-section-title {
      padding: 10px 14px 6px; font-size: 10px; letter-spacing: 2px;
      text-transform: uppercase; color: var(--text-dim);
      font-family: 'Share Tech Mono', monospace;
      border-bottom: 1px solid var(--panel-border); flex-shrink: 0;
    }
    .sb-list { overflow-y: auto; flex-shrink: 0; }
    .sb-list::-webkit-scrollbar { width: 4px; }
    .sb-list::-webkit-scrollbar-thumb { background: var(--panel-border); border-radius: 2px; }

    .sb-row {
      padding: 9px 14px; border-bottom: 1px solid rgba(255,255,255,0.04);
      cursor: pointer; transition: background .15s;
      display: flex; flex-direction: column; gap: 2px;
    }
    .sb-row:hover { background: rgba(0,212,255,0.06); }
    .sb-row.active { background: rgba(0,212,255,0.1); border-left: 2px solid var(--accent); }
    .sb-owner { font-size: 13px; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .sb-reg { font-family: 'Share Tech Mono', monospace; font-size: 11px; color: var(--accent); }
    .sb-desc { font-size: 11px; color: var(--text-dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    #sb-missing-section { flex-shrink: 0; }
    .sb-row.missing { cursor: default; opacity: 0.5; }
    .sb-row.missing:hover { background: none; }
    .sb-missing-badge { font-size: 9px; font-family: 'Share Tech Mono', monospace; color: var(--accent2); letter-spacing: 1px; }

    #sb-spacer { flex: 1; min-height: 8px; }

    /* ── Map ───────────────────────────────────────────────── */
    #map { flex: 1; position: relative; }

    /* ── Detail panel ──────────────────────────────────────── */
    #detail-panel {
      position: absolute; top: 12px; right: 12px; width: 300px;
      background: var(--panel-bg); border: 1px solid var(--panel-border);
      border-radius: 6px; z-index: 900; display: none; flex-direction: column;
      overflow: hidden; box-shadow: 0 8px 32px rgba(0,0,0,0.6);
      animation: slideIn .2s ease;
    }
    @keyframes slideIn { from { opacity:0; transform: translateX(16px); } to { opacity:1; transform: translateX(0); } }
    #detail-panel.open { display: flex; }

    #panel-header {
      background: rgba(0,212,255,0.06); border-bottom: 1px solid var(--panel-border);
      padding: 12px 16px; display: flex; align-items: flex-start; justify-content: space-between;
    }
    #panel-callsign { font-size: 22px; font-weight: 700; color: var(--accent); letter-spacing: 2px; }
    #panel-type { font-size: 12px; color: var(--text-dim); font-family: 'Share Tech Mono', monospace; }
    #panel-close { cursor: pointer; color: var(--text-dim); font-size: 20px; line-height: 1; transition: color .15s; }
    #panel-close:hover { color: var(--accent2); }

    #panel-body { padding: 14px 16px; display: flex; flex-direction: column; gap: 8px; }

    #panel-owner-box {
      background: rgba(0,212,255,0.05); border: 1px solid rgba(0,212,255,0.2);
      border-radius: 4px; padding: 8px 10px; margin-bottom: 4px;
    }
    #panel-owner-name { font-size: 16px; font-weight: 700; color: var(--text); }
    #panel-owner-desc { font-size: 12px; color: var(--text-dim); margin-top: 2px; }

    .data-row { display: flex; justify-content: space-between; align-items: baseline; border-bottom: 1px solid rgba(255,255,255,0.04); padding-bottom: 6px; }
    .data-row:last-child { border-bottom: none; }
    .data-label { font-size: 11px; color: var(--text-dim); letter-spacing: 1px; text-transform: uppercase; }
    .data-value { font-family: 'Share Tech Mono', monospace; font-size: 13px; color: var(--text); }
    .vr-up   { color: var(--good); }
    .vr-down { color: var(--accent2); }
    .vr-lvl  { color: var(--text-dim); }

    #trail-btn {
      margin-top: 8px; background: rgba(0,212,255,0.08);
      border: 1px solid var(--accent); color: var(--accent); padding: 7px;
      border-radius: 4px; cursor: pointer; font-family: inherit;
      font-size: 13px; font-weight: 600; letter-spacing: 1px; transition: all .2s;
    }
    #trail-btn:hover { background: rgba(0,212,255,0.18); }
    #trail-btn.active { background: var(--accent); color: var(--bg); }

    /* ── Legend ────────────────────────────────────────────── */
    #legend {
      position: absolute; bottom: 22px; left: 14px;
      background: var(--panel-bg); border: 1px solid var(--panel-border);
      border-radius: 6px; padding: 10px 14px; z-index: 900;
      font-size: 11px; color: var(--text-dim); line-height: 2;
      font-family: 'Share Tech Mono', monospace;
    }
    .leg-row { display: flex; align-items: center; gap: 8px; }
    .leg-dot { width: 10px; height: 10px; border-radius: 50%; }

    .leaflet-container { background: #0b0e14; }
    .leaflet-control-zoom a { background: var(--panel-bg) !important; color: var(--text) !important; border-color: var(--panel-border) !important; }
    .leaflet-control-attribution { background: rgba(11,14,20,0.7) !important; color: var(--text-dim) !important; }
    .leaflet-control-attribution a { color: var(--text-dim) !important; }
  </style>
</head>
<body>

<!-- ── Header ──────────────────────────────────────────────── -->
<div id="header">
  <h1>PLANE <span>TRACKER</span></h1>
  <div id="source-badge">AIRPLANES.LIVE</div>

  <div id="poller-status">
    <div id="poller-dot" class="waiting"></div>
    <span id="poller-label">WAITING</span>
  </div>

  <div id="next-cycle-wrap">NEXT CYCLE <span id="countdown">—</span></div>
  <div id="plane-count">Tracking <b id="count">0</b> aircraft</div>
  <div id="last-updated">—</div>
</div>

<!-- ── Shell ───────────────────────────────────────────────── -->
<div id="shell">

  <!-- Sidebar -->
  <div id="sidebar">
    <div class="sb-section-title">● AIRBORNE</div>
    <div class="sb-list" id="sb-found-list"></div>
    <div id="sb-spacer"></div>
    <div id="sb-missing-section">
      <div class="sb-section-title">○ NOT DETECTED</div>
      <div class="sb-list" id="sb-missing-list"></div>
    </div>
  </div>

  <!-- Map -->
  <div id="map">

    <!-- Detail panel -->
    <div id="detail-panel">
      <div id="panel-header">
        <div>
          <div id="panel-callsign">—</div>
          <div id="panel-type">—</div>
        </div>
        <div id="panel-close" onclick="closePanel()">✕</div>
      </div>
      <div id="panel-body">

        <div id="panel-owner-box">
          <div id="panel-owner-name">—</div>
          <div id="panel-owner-desc">—</div>
        </div>

        <div class="data-row">
          <span class="data-label">Tail / Reg</span>
          <span class="data-value" id="p-tail">—</span>
        </div>
        <div class="data-row">
          <span class="data-label">Aircraft Type</span>
          <span class="data-value" id="p-atype">—</span>
        </div>
        <div class="data-row">
          <span class="data-label">Altitude</span>
          <span class="data-value" id="p-alt">—</span>
        </div>
        <div class="data-row">
          <span class="data-label">Ground Speed</span>
          <span class="data-value" id="p-speed">—</span>
        </div>
        <div class="data-row">
          <span class="data-label">Heading</span>
          <span class="data-value" id="p-heading">—</span>
        </div>
        <div class="data-row">
          <span class="data-label">Vert. Rate</span>
          <span class="data-value" id="p-vr">—</span>
        </div>
        <div class="data-row">
          <span class="data-label">Squawk</span>
          <span class="data-value" id="p-squawk">—</span>
        </div>
        <div class="data-row">
          <span class="data-label">Last Seen</span>
          <span class="data-value" id="p-seen">—</span>
        </div>

        <button id="trail-btn" onclick="toggleTrail()">SHOW FLIGHT PATH</button>
      </div>
    </div>

    <!-- Legend -->
    <div id="legend">
      <div class="leg-row"><div class="leg-dot" style="background:#39ff8a"></div> Climbing</div>
      <div class="leg-row"><div class="leg-dot" style="background:#00d4ff"></div> Level flight</div>
      <div class="leg-row"><div class="leg-dot" style="background:#ff6b35"></div> Descending</div>
    </div>

  </div><!-- /#map -->
</div><!-- /#shell -->

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
// ============================================================
//  MAP INIT
// ============================================================
const map = L.map('map', { center: [30.0, -40.0], zoom: 3 });
L.tileLayer(
  'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',
  { attribution: '&copy; OpenStreetMap &copy; CARTO', subdomains: 'abcd', maxZoom: 19 }
).addTo(map);


// ============================================================
//  STATE
// ============================================================
let planeMarkers  = {};   // hex → Leaflet marker
let trailVisible  = false;
let selectedHex   = null;
let selectedTail  = null; // tail/reg of selected plane (for trail lookup)
let planesData    = [];
let missingData   = [];
let nextCycleTime = null;


// ============================================================
//  PLANE ICON
// ============================================================
function makePlaneIcon(heading, verticalRate) {
  const colour =
    verticalRate >  100 ? '#39ff8a' :
    verticalRate < -100 ? '#ff6b35' : '#00d4ff';
  const svg = `
    <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 28 28">
      <g transform="rotate(${heading}, 14, 14)">
        <polygon points="14,2 17,22 14,19 11,22" fill="${colour}" opacity="0.95"/>
        <polygon points="14,10 26,18 14,15 2,18"  fill="${colour}" opacity="0.85"/>
        <polygon points="14,18 19,26 14,24 9,26"  fill="${colour}" opacity="0.75"/>
        <circle cx="14" cy="4" r="2" fill="white" opacity="0.6"/>
      </g>
    </svg>`;
  return L.divIcon({ className: '', html: svg, iconSize: [28,28], iconAnchor: [14,14] });
}


// ============================================================
//  HEADER STATUS
// ============================================================
function tickCountdown() {
  const el = document.getElementById('countdown');
  if (!nextCycleTime) { el.textContent = '—'; return; }
  const secsLeft = Math.max(0, Math.round((nextCycleTime - Date.now()) / 1000));
  const m = String(Math.floor(secsLeft / 60)).padStart(2, '0');
  const s = String(secsLeft % 60).padStart(2, '0');
  el.textContent = `${m}:${s}`;
}

function updatePollerStatus(status, currentReg) {
  const dot   = document.getElementById('poller-dot');
  const label = document.getElementById('poller-label');
  if (status === 'polling') {
    dot.className     = 'polling';
    label.textContent = currentReg ? `POLLING ${currentReg}` : 'POLLING';
  } else if (status === 'waiting') {
    dot.className     = 'waiting';
    label.textContent = 'WAITING';
  } else {
    dot.className     = 'waiting';
    label.textContent = 'STARTING';
  }
}


// ============================================================
//  SIDEBAR RENDERERS
// ============================================================
function renderFoundList(planes) {
  const el = document.getElementById('sb-found-list');
  el.innerHTML = '';
  if (!planes.length) {
    el.innerHTML = '<div style="padding:12px 14px;font-size:12px;color:var(--text-dim)">None detected</div>';
    return;
  }
  planes.forEach(p => {
    const row = document.createElement('div');
    row.className = 'sb-row';
    row.id = `sb-row-${p.hex}`;
    row.innerHTML = `
      <div class="sb-owner">${p.owner || p.tail}</div>
      <div class="sb-reg">${p.tail}${p.callsign ? ' · ' + p.callsign : ''}</div>
      <div class="sb-desc">${p.description || ''}</div>`;
    row.addEventListener('click', () => selectPlane(p.hex));
    el.appendChild(row);
  });
}

function renderMissingList(missing) {
  const el = document.getElementById('sb-missing-list');
  el.innerHTML = '';
  if (!missing.length) {
    el.innerHTML = '<div style="padding:12px 14px;font-size:12px;color:var(--text-dim)">All planes detected</div>';
    return;
  }
  missing.forEach(m => {
    const row = document.createElement('div');
    row.className = 'sb-row missing';
    row.innerHTML = `
      <div class="sb-owner">${m.owner || m.tail}</div>
      <div class="sb-reg">${m.tail} <span class="sb-missing-badge">NO SIGNAL</span></div>
      <div class="sb-desc">${m.description || ''}</div>`;
    el.appendChild(row);
  });
}

function setSidebarActive(hex) {
  document.querySelectorAll('.sb-row.active').forEach(r => r.classList.remove('active'));
  const row = document.getElementById(`sb-row-${hex}`);
  if (row) row.classList.add('active');
}


// ============================================================
//  LOAD PLANES
//  Polls /api/planes every 10 seconds — reads the backend
//  per-plane cache, so any plane polled since the last check
//  will immediately appear or disappear from the map.
// ============================================================
async function loadPlanes() {
  try {
    const resp = await fetch('/api/planes');
    const data = await resp.json();

    planesData  = data.planes  || [];
    missingData = data.missing || [];

    document.getElementById('count').textContent = planesData.length;
    document.getElementById('last-updated').textContent =
      data.last_updated ? `UPDATED ${data.last_updated}` : '—';

    if (data.next_cycle) {
      nextCycleTime = new Date(data.next_cycle.replace(' UTC', 'Z'));
    }

    updatePollerStatus(data.status, data.current_reg);

    // Remove markers for planes no longer found
    const freshHexes = new Set(planesData.map(p => p.hex));
    for (const hex of Object.keys(planeMarkers)) {
      if (!freshHexes.has(hex)) { map.removeLayer(planeMarkers[hex]); delete planeMarkers[hex]; }
    }

    // Add or update a marker for each found plane.
    // Because the backend updates _plane_cache one plane at a time,
    // a plane polled 4 seconds ago will already be in this list
    // even if the rest of the watchlist hasn't been checked yet.
    for (const plane of planesData) {
      const icon = makePlaneIcon(plane.heading, plane.vertical);
      if (planeMarkers[plane.hex]) {
        planeMarkers[plane.hex].setLatLng([plane.lat, plane.lon]).setIcon(icon);
      } else {
        const marker = L.marker([plane.lat, plane.lon], { icon })
          .addTo(map)
          .on('click', () => selectPlane(plane.hex));
        marker.bindTooltip(
          `<b style="color:#00d4ff">${plane.owner || plane.callsign || plane.tail}</b>
           <br/>${plane.type} · ${Number(plane.altitude).toLocaleString()} ft`,
          { direction: 'top', offset: [0, -12] }
        );
        planeMarkers[plane.hex] = marker;
      }
    }

    renderFoundList(planesData);
    renderMissingList(missingData);
    if (selectedHex) setSidebarActive(selectedHex);

  } catch (err) {
    console.error('Failed to load planes:', err);
  }
}


// ============================================================
//  SELECT PLANE — populate and open the detail panel
// ============================================================
function selectPlane(hex) {
  selectedHex  = hex;
  trailVisible = false;

  const plane = planesData.find(p => p.hex === hex);
  if (!plane) return;

  // Store the tail number so toggleTrail knows which /api/trail/ to call
  selectedTail = plane.tail;

  document.getElementById('panel-callsign').textContent   = plane.callsign || plane.tail || 'N/A';
  document.getElementById('panel-type').textContent       = `${plane.type} · ${plane.hex.toUpperCase()}`;
  document.getElementById('panel-owner-name').textContent = plane.owner       || 'Unknown';
  document.getElementById('panel-owner-desc').textContent = plane.description || '';
  document.getElementById('p-tail').textContent    = plane.tail        || 'N/A';
  document.getElementById('p-atype').textContent   = plane.type        || 'Unknown';
  document.getElementById('p-alt').textContent     = `${Number(plane.altitude).toLocaleString()} ft`;
  document.getElementById('p-speed').textContent   = `${plane.speed} kts`;
  document.getElementById('p-heading').textContent = `${plane.heading}°`;
  document.getElementById('p-squawk').textContent  = plane.squawk || '—';
  document.getElementById('p-seen').textContent    = plane.seen != null ? `${plane.seen}s ago` : '—';

  const vr   = plane.vertical;
  const vrEl = document.getElementById('p-vr');
  vrEl.textContent = `${vr > 100 ? '▲' : vr < -100 ? '▼' : '→'} ${Math.abs(vr)} fpm`;
  vrEl.className   = `data-value ${vr > 100 ? 'vr-up' : vr < -100 ? 'vr-down' : 'vr-lvl'}`;

  document.getElementById('trail-btn').textContent = 'SHOW FLIGHT PATH';
  document.getElementById('trail-btn').classList.remove('active');
  clearTrailLayers();

  document.getElementById('detail-panel').classList.add('open');
  setSidebarActive(hex);
  map.panTo([plane.lat, plane.lon], { animate: true, duration: 0.5 });
}


// ============================================================
//  TRAIL
//  Fetches real trail points from /api/trail/<reg>.
//  These come from the airplanes.live response and cover the
//  last few minutes of flight — drawn as a gradient polyline,
//  dim at the oldest point and bright at the current position.
// ============================================================
function clearTrailLayers() {
  map.eachLayer(layer => {
    if (layer instanceof L.Polyline || layer instanceof L.CircleMarker) map.removeLayer(layer);
  });
}

async function drawTrail(tail) {
  clearTrailLayers();

  try {
    const resp  = await fetch(`/api/trail/${tail}`);
    const data  = await resp.json();
    const trail = data.trail;

    if (!trail || trail.length < 2) {
      // Fewer than 2 points — fall back to a heading-direction line
      const plane = planesData.find(p => p.tail === tail);
      if (plane) {
        const rad     = (plane.heading - 180) * Math.PI / 180;
        const tailLat = plane.lat + Math.cos(rad) * 0.3;
        const tailLon = plane.lon + Math.sin(rad) * 0.3;
        L.polyline([[tailLat, tailLon], [plane.lat, plane.lon]], {
          color: '#00d4ff', weight: 2, opacity: 0.5, dashArray: '6 4',
        }).addTo(map);
      }
      return;
    }

    // Draw gradient trail — older segments are dimmer and thinner
    for (let i = 0; i < trail.length - 1; i++) {
      const frac    = i / (trail.length - 1);     // 0 = oldest, 1 = newest
      const opacity = 0.15 + frac * 0.85;
      const weight  = 1   + frac * 2.5;
      L.polyline(
        [[trail[i].lat, trail[i].lon], [trail[i+1].lat, trail[i+1].lon]],
        { color: '#00d4ff', weight, opacity, lineJoin: 'round' }
      ).addTo(map);
    }

    // Small dot at the oldest known point
    L.circleMarker([trail[0].lat, trail[0].lon], {
      radius: 4, color: '#00d4ff', fillColor: '#00d4ff',
      fillOpacity: 0.3, weight: 1,
    }).addTo(map).bindTooltip('Trail start');

  } catch (err) {
    console.error('Trail fetch error:', err);
  }
}

function toggleTrail() {
  const btn = document.getElementById('trail-btn');
  if (!selectedTail) return;

  if (!trailVisible) {
    drawTrail(selectedTail);
    btn.textContent = 'HIDE FLIGHT PATH';
    btn.classList.add('active');
    trailVisible = true;
  } else {
    clearTrailLayers();
    btn.textContent = 'SHOW FLIGHT PATH';
    btn.classList.remove('active');
    trailVisible = false;
  }
}


// ============================================================
//  CLOSE PANEL
// ============================================================
function closePanel() {
  document.getElementById('detail-panel').classList.remove('open');
  document.querySelectorAll('.sb-row.active').forEach(r => r.classList.remove('active'));
  selectedHex  = null;
  selectedTail = null;
  clearTrailLayers();
  trailVisible = false;
}


// ============================================================
//  TIMERS
// ============================================================
loadPlanes();
setInterval(loadPlanes,    10_000);   // refresh map from cache every 10s
setInterval(tickCountdown,  1_000);   // tick countdown clock every 1s
</script>
</body>
</html>
